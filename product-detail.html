<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details - Noor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>
.product-detail-page {
    padding: 80px 50px;
    min-height: 70vh;
}
.product-detail-container {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 50px;
    background: white;
    border-radius: 30px;
    padding: 40px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}
.product-gallery {
    position: relative;
}
.main-image {
    width: 100%;
    border-radius: 20px;
    margin-bottom: 20px;
}
.thumbnail-gallery {
    display: flex;
    gap: 10px;
}
.thumbnail {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    border: 2px solid transparent;
}
.thumbnail.active {
    border-color: #e91e63;
}
.product-info-detail h1 {
    font-size: 32px;
    margin-bottom: 15px;
}
.product-rating-detail {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}
.price-detail {
    font-size: 28px;
    color: #e91e63;
    font-weight: 700;
    margin-bottom: 20px;
}
.product-description {
    margin-bottom: 30px;
    line-height: 1.8;
    color: #666;
}
.product-options {
    margin-bottom: 30px;
}
.option-label {
    font-weight: 600;
    margin-bottom: 10px;
    display: block;
}
.size-options {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}
.size-btn {
    padding: 10px 20px;
    border: 1px solid #ddd;
    border-radius: 10px;
    background: white;
    cursor: pointer;
    transition: all 0.3s;
}
.size-btn.selected {
    background: #e91e63;
    color: white;
    border-color: #e91e63;
}
.quantity-selector {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 30px;
}
.quantity-selector button {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid #ddd;
    background: white;
    cursor: pointer;
    transition: all 0.3s;
}
.quantity-selector button:hover {
    background: #e91e63;
    color: white;
    border-color: #e91e63;
}
.action-buttons {
    display: flex;
    gap: 15px;
}
.add-to-cart-detail {
    flex: 1;
    padding: 15px;
    background: linear-gradient(135deg, #e91e63, #ff6b9d);
    border: none;
    border-radius: 15px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.3s;
}
.add-to-cart-detail:hover {
    transform: translateY(-2px);
}
.buy-now {
    flex: 1;
    padding: 15px;
    background: #2d2d2d;
    border: none;
    border-radius: 15px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.3s;
}
.buy-now:hover {
    transform: translateY(-2px);
    background: #1a1a1a;
}
.wishlist-detail {
    margin-top: 20px;
    text-align: center;
}
.wishlist-detail button {
    background: none;
    border: none;
    color: #e91e63;
    cursor: pointer;
    font-size: 16px;
    transition: transform 0.3s;
}
.wishlist-detail button:hover {
    transform: scale(1.05);
}
.share-product {
    margin-top: 20px;
    display: flex;
    gap: 15px;
    justify-content: center;
}
.share-product i {
    font-size: 20px;
    cursor: pointer;
    color: #666;
    transition: color 0.3s;
}
.share-product i:hover {
    color: #e91e63;
}
.gender-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-left: 10px;
}
.gender-badge.women {
    background: #ffe0f0;
    color: #e91e63;
}
.gender-badge.men {
    background: #e0e8ff;
    color: #2196f3;
}
.gender-badge.unisex {
    background: #e0ffe0;
    color: #4caf50;
}
@media (max-width: 768px) {
    .product-detail-container { grid-template-columns: 1fr; padding: 20px; }
    .product-detail-page { padding: 80px 20px; }
    .action-buttons { flex-direction: column; }
}
</style>
</head>

// Find product by ID, show error if not found
let product = allProducts.find(p => p.id === productId);
let selectedSize = product && product.sizes ? product.sizes[0] : '';
let quantity = 1;


// Helper function to show notification
function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.className = `notification notification-${type}`;
    notification.innerHTML = `
        <div class="notification-content">
            <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
            <span>${message}</span>
        </div>
    `;
   
    if (!document.querySelector('#notification-styles-detail')) {
        const style = document.createElement('style');
        style.id = 'notification-styles-detail';
        style.textContent = `
            .notification {
                position: fixed;
                top: 100px;
                right: 20px;
                background: white;
                padding: 15px 25px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                z-index: 10000;
                animation: slideInRight 0.3s ease;
                border-left: 4px solid;
            }
            .notification-success { border-left-color: #4caf50; }
            .notification-error { border-left-color: #ff4444; }
            .notification-info { border-left-color: #2196f3; }
            .notification-content { display: flex; align-items: center; gap: 10px; }
            @keyframes slideInRight {
                from { opacity: 0; transform: translateX(100px); }
                to { opacity: 1; transform: translateX(0); }
            }
        `;
        document.head.appendChild(style);
    }
   
    document.body.appendChild(notification);
   
    setTimeout(() => {
        notification.remove();
    }, 3000);
}


function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const cartCountElements = document.querySelectorAll('#cart-count, #cart-count-nav');
    cartCountElements.forEach(el => {
        if (el) el.innerText = cart.length;
    });
}


function getGenderBadge(gender) {
    if (gender === 'women') {
        return '<span class="gender-badge women">👩 Women</span>';
    } else if (gender === 'men') {
        return '<span class="gender-badge men">👨 Men</span>';
    } else {
        return '<span class="gender-badge unisex">🌍 Unisex</span>';
    }
}


function renderProductDetail() {
    const container = document.getElementById('productDetailContainer');
    if (!container) return;
   
    if (!product) {
        container.innerHTML = `
            <div style="text-align: center; padding: 60px;">
                <i class="fas fa-exclamation-triangle" style="font-size: 60px; color: #e91e63;"></i>
                <h2>Product Not Found</h2>
                <p>The product you're looking for doesn't exist or has been removed.</p>
                <button class="add-to-cart-detail" style="margin-top: 20px;" onclick="window.location.href='index.html'">Back to Shop</button>
            </div>
        `;
        return;
    }
   
    // Generate stars HTML
    const fullStars = Math.floor(product.rating);
    const emptyStars = 5 - fullStars;
    const stars = '★'.repeat(fullStars) + '☆'.repeat(emptyStars);
   
    // Size options HTML
    let sizeHtml = '';
    if (product.sizes && product.sizes.length > 0) {
        sizeHtml = `
            <div class="product-options">
                <label class="option-label">Select Size</label>
                <div class="size-options">
                    ${product.sizes.map(size => `<button class="size-btn ${selectedSize === size ? 'selected' : ''}" onclick="selectSize('${size}')">${size}</button>`).join('')}
                </div>
            </div>
        `;
    }
   
    container.innerHTML = `
        <div class="product-gallery">
            <img src="${product.image}" alt="${product.name}" class="main-image" id="mainImage">
            <div class="thumbnail-gallery" id="thumbnailGallery">
                ${product.images && product.images.length > 0 ? product.images.map(img => `<img src="${img}" class="thumbnail" onclick="changeImage('${img}')">`).join('') : ''}
            </div>
        </div>
        <div class="product-info-detail">
            <h1>${product.name} ${getGenderBadge(product.gender)}</h1>
            <div class="product-rating-detail">
                <div class="stars" style="color: #ffc107;">${stars}</div>
                <span>${product.rating} (${product.reviews} reviews)</span>
                <span class="in-stock" style="color: #4caf50;">✓ In Stock</span>
            </div>
            <div class="price-detail">₹${product.price}</div>
            <div class="product-description">
                <p>${product.description}</p>
            </div>
            ${sizeHtml}
            <div class="quantity-selector">
                <label class="option-label">Quantity</label>
                <button onclick="updateQuantity(-1)">-</button>
                <span id="quantityValue" style="min-width: 40px; text-align: center;">${quantity}</span>
                <button onclick="updateQuantity(1)">+</button>
            </div>
            <div class="action-buttons">
                <button class="add-to-cart-detail" onclick="addToCartDetail()">Add to Cart 🛒</button>
                <button class="buy-now" onclick="buyNow()">Buy Now →</button>
            </div>
            <div class="wishlist-detail">
                <button onclick="addToWishlist()"><i class="far fa-heart"></i> Add to Wishlist</button>
            </div>
            <div class="share-product">
                <span>Share this product:</span>
                <i class="fab fa-facebook" onclick="shareProduct('facebook')"></i>
                <i class="fab fa-twitter" onclick="shareProduct('twitter')"></i>
                <i class="fab fa-whatsapp" onclick="shareProduct('whatsapp')"></i>
                <i class="fas fa-link" onclick="copyProductLink()"></i>
            </div>
        </div>
    `;
}


function selectSize(size) {
    selectedSize = size;
    // Update UI without re-rendering everything
    document.querySelectorAll('.size-btn').forEach(btn => {
        if (btn.innerText === size) {
            btn.classList.add('selected');
        } else {
            btn.classList.remove('selected');
        }
    });
}


function updateQuantity(change) {
    quantity = Math.max(1, quantity + change);
    const quantitySpan = document.getElementById('quantityValue');
    if (quantitySpan) quantitySpan.innerText = quantity;
}


function changeImage(imgSrc) {
    const mainImage = document.getElementById('mainImage');
    if (mainImage) mainImage.src = imgSrc;
   
    // Update active thumbnail
    document.querySelectorAll('.thumbnail').forEach(thumb => {
        thumb.classList.remove('active');
        if (thumb.src === imgSrc) {
            thumb.classList.add('active');
        }
    });
}


// Add to Cart function
function addToCartDetail() {
    if (!product) return;
   
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
   
    // Create cart item
    const cartItem = {
        id: product.id,
        name: product.name,
        price: product.price,
        image: product.image,
        quantity: quantity,
        size: selectedSize,
        gender: product.gender,
        description: product.description.substring(0, 50) + '...'
    };
   
    // Check if item already exists (with same size if applicable)
    const existingItem = cart.find(item =>
        item.id === product.id &&
        (product.sizes && product.sizes.length > 0 ? item.size === selectedSize : true)
    );
   
    if (existingItem) {
        existingItem.quantity += quantity;
    } else {
        cart.push(cartItem);
    }
   
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
   
    // Show success animation
    showAddToCartAnimation();
    showNotification(`${product.name} added to cart! 🛒`, 'success');
}


// Buy Now function
function buyNow() {
    if (!product) return;
   
    // First add to cart
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
   
    const cartItem = {
        id: product.id,
        name: product.name,
        price: product.price,
        image: product.image,
        quantity: quantity,
        size: selectedSize,
        gender: product.gender,
        description: product.description.substring(0, 50) + '...'
    };
   
    const existingItem = cart.find(item =>
        item.id === product.id &&
        (product.sizes && product.sizes.length > 0 ? item.size === selectedSize : true)
    );
   
    if (existingItem) {
        existingItem.quantity += quantity;
    } else {
        cart.push(cartItem);
    }
   
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
   
    // Redirect to checkout page
    window.location.href = 'checkout.html';
}


function showAddToCartAnimation() {
    const floatingCart = document.querySelector('.floating-cart');
    if (floatingCart) {
        floatingCart.style.transform = 'scale(1.2)';
        setTimeout(() => {
            floatingCart.style.transform = 'scale(1)';
        }, 300);
    }
}


function addToWishlist() {
    if (!product) return;
   
    let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
    const exists = wishlist.some(item => item.id === product.id);
   
    if (!exists) {
        wishlist.push({
            id: product.id,
            name: product.name,
            price: product.price,
            image: product.image,
            gender: product.gender
        });
        localStorage.setItem('wishlist', JSON.stringify(wishlist));
        showNotification(`${product.name} added to wishlist! ❤️`, 'success');
    } else {
        showNotification('Product already in wishlist!', 'info');
    }
}


function shareProduct(platform) {
    const url = encodeURIComponent(window.location.href);
    const text = encodeURIComponent(`Check out ${product.name} on Noor!`);
   
    const shareUrls = {
        facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}`,
        twitter: `https://twitter.com/intent/tweet?text=${text}&url=${url}`,
        whatsapp: `https://wa.me/?text=${text}%20${url}`
    };
   
    window.open(shareUrls[platform], '_blank', 'width=600,height=400');
}


function copyProductLink() {
    navigator.clipboard.writeText(window.location.href);
    showNotification('Product link copied to clipboard!', 'success');
}


function toggleGenderModal() {
    window.location.href = 'index.html';
}


// Initialize page
renderProductDetail();
updateCartCount();


// Update cart count when cart changes in another tab
window.addEventListener('storage', function(e) {
    if (e.key === 'cart') {
        updateCartCount();
    }
});
</script>
