<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed - Noor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>
.success-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 100px 20px;
    background: linear-gradient(135deg, #fff0f5, #ffe4ec);
}
.success-container {
    background: white;
    border-radius: 30px;
    max-width: 600px;
    width: 100%;
    padding: 50px;
    text-align: center;
    box-shadow: 0 30px 60px rgba(0,0,0,0.1);
    animation: slideUp 0.5s ease;
}
.success-icon {
    font-size: 80px;
    color: #4caf50;
    margin-bottom: 20px;
}
.success-container h1 {
    font-size: 32px;
    margin-bottom: 10px;
}
.order-id {
    background: #f5f5f5;
    padding: 10px;
    border-radius: 10px;
    margin: 20px 0;
    font-family: monospace;
    font-size: 18px;
}
.order-details-summary {
    text-align: left;
    margin: 30px 0;
    padding: 20px;
    background: #f9f9f9;
    border-radius: 15px;
}
.order-details-summary p {
    margin: 10px 0;
}
.action-buttons-success {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 30px;
}
.track-btn, .shop-btn {
    padding: 12px 25px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 600;
}
.track-btn {
    background: linear-gradient(135deg, #e91e63, #ff6b9d);
    border: none;
    color: white;
}
.shop-btn {
    background: white;
    border: 1px solid #e91e63;
    color: #e91e63;
}
@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>
<body>


<div class="success-page">
    <div class="success-container">
        <div class="success-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1>Order Confirmed! 🎉</h1>
        <p>Thank you for shopping with Noor</p>
       
        <div id="orderDetails"></div>
       
        <div class="action-buttons-success">
            <button class="track-btn" onclick="trackOrder()">Track Order →</button>
            <button class="shop-btn" onclick="continueShopping()">Continue Shopping</button>
        </div>
    </div>
</div>


<script>
const currentOrder = JSON.parse(localStorage.getItem('currentOrder'));


function displayOrderDetails() {
    const container = document.getElementById('orderDetails');
   
    if (currentOrder) {
        container.innerHTML = `
            <div class="order-id">Order #: ${currentOrder.orderId}</div>
            <div class="order-details-summary">
                <p><strong>Estimated Delivery:</strong> ${currentOrder.estimatedDelivery}</p>
                <p><strong>Payment Method:</strong> ${currentOrder.paymentMethod === 'cod' ? 'Cash on Delivery' : 'Card Payment'}</p>
                <p><strong>Total Amount:</strong> ₹${currentOrder.total}</p>
                <p><strong>Shipping to:</strong> ${currentOrder.shippingAddress.address}, ${currentOrder.shippingAddress.city}</p>
            </div>
            <p style="color: #666;">A confirmation email has been sent to ${currentOrder.customer.email}</p>
        `;
    } else {
        container.innerHTML = `<p>No order found. <a href="index.html">Shop now</a></p>`;
    }
}


function trackOrder() {
    if (currentOrder) {
        localStorage.setItem('trackOrderId', currentOrder.orderId);
        window.location.href = 'track-order.html';
    }
}


function continueShopping() {
    window.location.href = 'index.html';
}


displayOrderDetails();
</script>
</body>
</html>
